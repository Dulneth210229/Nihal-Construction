<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BuildMaster Projects</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles/project.css" />
  </head>
  <body>
    <!--nav bar-->
    <body>
        <!--nav bar-->
        <nav class="navbar">
          <div class="nav-content">
            <div class="logo">
              <div ><span style="color: #7c3aed;">Nihal </span><span style="color: black;">Construction</span></div>
    
    
            </div>
            <div class="nav-links">
              <a href="index.html#home"><i class="fa-solid fa-house"></i>Home</a>
    
              <a href="index.html#services"><i class="fas fa-tools"></i>Services</a>
    
              <a href="#projects"
              ><i class="fas fa-project-diagram"></i>Projects</a
            >
            <a href="index.html#about"><i class="fas fa-user"></i>About</a>
            <a href="index.html#contact"><i class="fas fa-envelope"></i>Contact</a>
            </div>
            <button class="menu-btn">
                <i class="fas fa-bars"></i>
            </button>
          </div>
        </nav>

    <div class="projects-header">
      <div class="container">
        <h1>Our Construction Projects</h1>
        <p>Explore our diverse range of construction projects</p>
      </div>
    </div>

    <div class="container">
      <div class="project-filters">
        <button class="filter-btn active" data-filter="all">
          All Projects
        </button>
        <button class="filter-btn" data-filter="ongoing">
          Ongoing Projects
        </button>
        <button class="filter-btn" data-filter="completed">
          Completed Projects
        </button>
      </div>

      <div id="projects-grid" class="projects-grid"></div>
    </div>

    <div id="project-modal" class="project-modal">
      <div class="modal-content">
        <span class="modal-close">&times;</span>
        <div id="modal-details"></div>
      </div>
    </div>

    <script src="script/project.js"></script>
    
  </body>
</html>
